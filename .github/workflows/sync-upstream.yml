name: Sync Upstream Content

on:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * *'

permissions:
  contents: write

jobs:
  sync-upstream:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --no-package-lock

      - name: Sync upstream content
        run: npm run sync:upstream

      - name: Build site
        run: npm run build

      - name: Commit and push changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/upstream README.md src/App.jsx index.html package.json docs/roadmap.md scripts/sync-upstream.mjs .github/workflows/sync-upstream.yml
          git commit -m "chore: sync upstream content"
          git push origin main
